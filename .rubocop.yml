plugins:
  - rubocop-performance
  - rubocop-rspec

AllCops:
  TargetRubyVersion: 3.2
  NewCops: enable
  SuggestExtensions: false
  Exclude:
    - 'vendor/**/*'
    - 'coverage/**/*'

# Frozen string literals required in all files
Style/Documentation:
  Enabled: false

Style/FrozenStringLiteralComment:
  Enabled: true
  EnforcedStyle: always

# Loosen metrics for spec files and gemspec
Metrics/BlockLength:
  Max: 60
  Exclude:
    - 'spec/**/*'
    - '*.gemspec'

Metrics/MethodLength:
  Max: 25

Metrics/ClassLength:
  Max: 150

Metrics/AbcSize:
  Max: 25

# RSpec settings
RSpec/ExampleLength:
  Max: 20

RSpec/MultipleExpectations:
  Max: 5

RSpec/NestedGroups:
  Max: 5

RSpec/DescribeClass:
  Exclude:
    - 'spec/integration/**/*'

RSpec/SpecFilePathFormat:
  Enabled: false

RSpec/SpecFilePathSuffix:
  Enabled: false

# Strategy specs legitimately need 6+ memoized helpers (config, http_client,
# image_analyzer, html_parser, responses, subject).
RSpec/MultipleMemoizedHelpers:
  Enabled: false

# We mock HTTP chain and the http gem's response — instance_double would
# require pinning to Nokogiri / HTTP internal classes that may change.
RSpec/VerifiedDoubles:
  Enabled: false

# html_parser_spec tests both ParsedDocument and NokogiriParser in one file.
RSpec/MultipleDescribes:
  Enabled: false

RSpec/MessageSpies:
  Enabled: false
